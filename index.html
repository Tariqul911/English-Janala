<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Font awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />

    <!-- Daisy UI and Tailwind -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Style Sheet -->
    <link rel="stylesheet" href="style/style.css" />

    <title>English Janala</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/x-icon" />
  </head>
  <body>
    <!-- Header -->
    <header>
      <div class="navbar bg-[#badeff4c] shadow-sm px-14">
        <div class="navbar-start">
          <a href="" class="flex items-center gap-1">
            <span class="text-lg font-bold">English</span>
            <img src="assets/logo.png" alt="" />
            <span class="text-lg font-semibold">জানালা</span>
          </a>
        </div>

        <div class="navbar-end space-x-4">
          <button class="btn btn-outline btn-primary">
            <i class="fa-solid fa-circle-question"></i>
            FAQ
          </button>
          <button class="btn btn-outline btn-primary">
            <i class="fa-solid fa-book-open"></i>
            Learn
          </button>
          <button class="btn btn-outline btn-primary">
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
            Logout
          </button>
        </div>
      </div>
    </header>

    <!-- Banner Section -->
    <section class="w-11/12 mx-auto">
      <div class="flex justify-between items-center gap-5">
        <!-- left -->
        <div class="flex-1">
          <h2 class="text-4xl font-bold mb-10">
            <span class="text-[#00BCFF]">English</span> is Easy!!
          </h2>
          <p class="text-lg">
            আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা
            <br />
            আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons আপনাকে নিয়ে
            <br />
            যাবে অন্য একটি Level এ
          </p>
          <!-- <div class="flex">
            <input placeholder="Enter Your Name" type="text" name="" id="" />
            <input type="text" name="" id="" />
            <button class="btn btn-primary">Get Started</button>
          </div> -->
        </div>
        <!-- right -->
        <div class="flex-1">
          <img src="assets/hero-student.png" alt="" />
        </div>
      </div>
    </section>

    <!-- Learn Vocabulary -->
    <section class="space-y-10">
      <h2 class="text-4xl font-bold mb-10 text-center">
        <span class="text-[#00BCFF]">Let's</span> Learn Vocabularies
      </h2>
      <div
        id="level-container"
        class="flex gap-5 flex-wrap justify-center"
      ></div>
    </section>

    <!-- Word container button data load -->
    <section
      id="word-container"
      class="bg-gray-100 p-10 w-11/12 mx-auto mt-10 grid grid-cols-3 gap-5 mb-10 rounded-lg"
    ></section>

    <!-- Open the modal using ID.showModal() method -->
    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
      <div class="modal-box">
        <h3 class="text-lg font-bold">Hello!</h3>
        <p class="py-4">Press ESC key or click the button below to close</p>
        <div class="modal-action">
          <form method="dialog">
            <!-- if there is a button in form, it will close the modal -->
            <button class="btn">Close</button>
          </form>
        </div>
      </div>
    </dialog>

    <script src="script/app.js"></script>
  </body>
</html>
